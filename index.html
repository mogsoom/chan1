<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHAN STAGE - Student</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<main class="app">
  <header class="hero">
    <h1>🎤 CHAN STAGE</h1>
    <p class="subtitle">오늘의 무대를 성공하자</p>
    <div class="stage-badge" id="levelBadge">LV.1 TRAINEE</div>
    <div class="nav"><a class="link-btn dark-btn" href="admin.html">보호자 화면</a></div>
  </header>

  <section class="panel dashboard">
    <div class="stat-card">
      <h2>🌟 STAGE STATUS</h2>
      <div class="big-level" id="bigLevel">LV.1 TRAINEE</div>
      <div class="exp-label" id="expText">이번 달 팬라이트 0개</div>
      <div class="bar-wrap"><div class="bar" id="expBar"></div></div>
    </div>
    <div class="stat-card">
      <h2>🎁 REWARD</h2>
      <div class="reward-box">
        <div class="reward" id="smallReward">10 LIGHT</div>
        <div class="reward" id="bigReward">20 LIGHT</div>
      </div>
    </div>
  </section>

  <section class="panel">
    <h2>🎬 TODAY'S STAGE</h2>
    <div class="progress-row">
      <div class="exp-label" id="progressText">오늘 0개 중 0개 완료</div>
      <div class="bar-wrap"><div class="bar" id="progressBar"></div></div>
    </div>
    <div class="missions" id="missionList"></div>
  </section>

  <section class="panel">
    <h2>🩵 FAN LIGHT BOARD</h2>
    <div class="light-board" id="lightBoard"></div>
  </section>

  <section class="panel">
    <h2>📅 MONTH STAGE</h2>
    <div class="month-board" id="monthBoard"></div>
  </section>

  <footer>완벽하지 않아도 괜찮아. 오늘 무대에 올라간 것이 성공!</footer>
</main>
<div class="toast" id="toast"></div>
<script src="shared.js"></script>
<script>
const t = todayInfo();
const key = t.monthKey;
let data = loadMonthData(key);

const missionList = document.getElementById("missionList");
const lightBoard = document.getElementById("lightBoard");
const monthBoard = document.getElementById("monthBoard");
const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");
const expText = document.getElementById("expText");
const expBar = document.getElementById("expBar");
const levelBadge = document.getElementById("levelBadge");
const bigLevel = document.getElementById("bigLevel");
const toast = document.getElementById("toast");
const smallReward = document.getElementById("smallReward");
const bigReward = document.getElementById("bigReward");

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"), 1400);
}
function completeMission(id){
  const m = data.missions.find(x=>x.id===id);
  if(!m || m.done) return;
  m.done = true;
  const todayLights = getTodayLights(data, t.dateKey);
  if(todayLights.length < 20) todayLights.push({icon:rand(lights), text:"LIGHT ON"});
  saveMonthData(key, data);
  render();
  showToast(rand(cheers));
}
function renderMissions(){
  missionList.innerHTML = "";
  if(data.missions.length === 0){
    missionList.innerHTML = '<div class="empty-message">오늘의 무대가 비어 있어요.</div>';
    return;
  }
  data.missions.forEach(m=>{
    const card = document.createElement("article");
    card.className = "mission" + (m.done ? " done" : "");
    card.innerHTML = `
      <div class="mission-title">${categoryIcon(m.category)} ${m.done ? "CLEAR: " : ""}${m.title}</div>
      <span class="tag">${m.category} · ${m.level}</span>
    `;
    const btn = document.createElement("button");
    btn.className = "neon-btn";
    btn.textContent = m.done ? "CLEAR ✓" : "MISSION CLEAR";
    btn.disabled = m.done;
    btn.addEventListener("click", ()=>completeMission(m.id));
    card.appendChild(btn);
    missionList.appendChild(card);
  });
}
function renderLightBoard(){
  lightBoard.innerHTML = "";
  const arr = getTodayLights(data, t.dateKey);
  for(let i=0;i<20;i++){
    const cell = document.createElement("div");
    cell.className = "light-cell" + (arr[i] ? " on" : "");
    cell.textContent = arr[i] ? arr[i].icon : "OFF";
    lightBoard.appendChild(cell);
  }
  smallReward.textContent = `10 LIGHT: ${data.rewards?.small || "작은 보상"}`;
  bigReward.textContent = `20 LIGHT: ${data.rewards?.big || "큰 보상"}`;
  smallReward.classList.toggle("active", arr.length >= 10);
  bigReward.classList.toggle("active", arr.length >= 20);
}
function renderMonthBoard(){
  monthBoard.innerHTML = "";
  const first = new Date(t.year, t.month-1, 1).getDay();
  const last = new Date(t.year, t.month, 0).getDate();
  for(let i=0;i<first;i++){
    const e=document.createElement("div"); e.className="day-cell empty"; monthBoard.appendChild(e);
  }
  for(let d=1;d<=last;d++){
    const dk = dateKey(t.year,t.month,d);
    const arr = data.dailyLights[dk] || [];
    const cell = document.createElement("div");
    cell.className = "day-cell" + (d===t.date ? " today" : "");
    cell.innerHTML = `<div class="day-num">${d}일</div><div class="day-lights">${arr.map(x=>x.icon).join("")}</div>${arr.length ? `<div class="day-num">${arr.length} LIGHT</div>` : ""}`;
    monthBoard.appendChild(cell);
  }
}
function renderStatus(){
  const total = data.missions.length;
  const done = data.missions.filter(x=>x.done).length;
  const p = total ? Math.round(done/total*100) : 0;
  progressText.textContent = `오늘 ${total}개 중 ${done}개 CLEAR`;
  progressBar.style.width = p + "%";

  const monthCount = getMonthLightCount(data);
  const lv = getLevel(monthCount);
  levelBadge.textContent = `LV.${lv.level} ${lv.name}`;
  bigLevel.textContent = `LV.${lv.level} ${lv.name}`;
  expText.textContent = `이번 달 팬라이트 ${monthCount}개`;
  expBar.style.width = Math.min(100, (monthCount % 25) * 4) + "%";
}
function render(){ renderMissions(); renderLightBoard(); renderMonthBoard(); renderStatus(); }
render();
</script>
</body>
</html>
